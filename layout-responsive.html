<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>播放器 - 响应式 + 双主题</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { 
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    display: flex;
    justify-content: center;
    align-items: flex-start;
    min-height: 100vh;
    padding: 20px;
    transition: background 0.3s;
  }
  
  /* ===== 暗色主题 ===== */
  [data-theme="dark"] {
    --bg: #121212;
    --surface: rgba(255,255,255,0.05);
    --surface-hover: rgba(255,255,255,0.08);
    --surface-active: rgba(255,255,255,0.12);
    --border: rgba(255,255,255,0.08);
    --text: #ffffff;
    --text-dim: #b3b3b3;
    --text-faint: rgba(255,255,255,0.3);
    --accent: #d49a6a;
    --accent-hover: #e8b88a;
    --accent-glow: rgba(212,154,106,0.3);
    --accent-soft: rgba(212,154,106,0.15);
    --card-bg: rgba(255,255,255,0.03);
    --shadow: 0 8px 32px rgba(0,0,0,0.4);
  }
  
  /* ===== 亮色主题（Hanako 风格）===== */
  [data-theme="light"] {
    --bg: #FFF8E7;
    --surface: rgba(0,0,0,0.03);
    --surface-hover: rgba(0,0,0,0.05);
    --surface-active: rgba(0,0,0,0.08);
    --border: rgba(0,0,0,0.08);
    --text: #3d3320;
    --text-dim: rgba(0,0,0,0.5);
    --text-faint: rgba(0,0,0,0.25);
    --accent: #c48454;
    --accent-hover: #d49a6a;
    --accent-glow: rgba(196,132,84,0.2);
    --accent-soft: rgba(196,132,84,0.1);
    --card-bg: rgba(0,0,0,0.02);
    --shadow: 0 8px 32px rgba(0,0,0,0.08);
  }
  
  body { background: var(--bg); color: var(--text); }
  
  /* ===== 播放器容器 ===== */
  .player-wrapper {
    width: 100%;
    max-width: 700px;
    background: var(--bg);
    border-radius: 16px;
    overflow: hidden;
    display: flex;
    flex-direction: column;
    box-shadow: var(--shadow);
    border: 1px solid var(--border);
  }
  
  /* ===== 主内容区 ===== */
  .main-content {
    flex: 1;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }
  
  /* ===== 正在播放区 ===== */
  .now-playing {
    padding: 24px;
    display: flex;
    gap: 20px;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
  }
  
  /* 封面 */
  .cover-container {
    width: 140px;
    height: 140px;
    border-radius: 12px;
    overflow: hidden;
    box-shadow: var(--shadow);
    flex-shrink: 0;
  }
  
  .cover-art {
    width: 100%;
    height: 100%;
    background: linear-gradient(135deg, var(--accent), var(--accent-hover));
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 56px;
    position: relative;
  }
  
  .cover-art::before {
    content: '';
    position: absolute;
    top: 50%;
    left: 50%;
    width: 36px;
    height: 36px;
    background: rgba(0,0,0,0.15);
    border-radius: 50%;
    transform: translate(-50%, -50%);
  }
  
  .cover-art.spinning {
    animation: spin 20s linear infinite;
  }
  
  @keyframes spin {
    from { transform: rotate(0deg); }
    to { transform: rotate(360deg); }
  }
  
  /* 歌曲信息 */
  .track-info {
    flex: 1;
    display: flex;
    flex-direction: column;
    justify-content: center;
    min-width: 0;
  }
  
  .track-title {
    font-size: 20px;
    font-weight: 700;
    margin-bottom: 4px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  
  .track-artist {
    font-size: 14px;
    color: var(--text-dim);
    margin-bottom: 16px;
  }
  
  .track-actions {
    display: flex;
    gap: 10px;
  }
  
  .action-btn {
    width: 36px;
    height: 36px;
    border-radius: 50%;
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--text-dim);
    font-size: 16px;
    cursor: pointer;
    transition: all 0.2s;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  
  .action-btn:hover {
    background: var(--surface-hover);
    color: var(--text);
  }
  
  .action-btn.active {
    background: var(--accent-soft);
    border-color: var(--accent);
    color: var(--accent);
  }
  
  /* 歌词区域 */
  .lyrics-section {
    padding: 0 24px 20px;
    height: 120px;
    overflow: hidden;
    position: relative;
  }
  
  .lyrics-scroll {
    height: 100%;
    overflow-y: auto;
    scrollbar-width: none;
    mask-image: linear-gradient(transparent 0%, black 20%, black 80%, transparent 100%);
    -webkit-mask-image: linear-gradient(transparent 0%, black 20%, black 80%, transparent 100%);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
  }
  
  .lyrics-scroll::-webkit-scrollbar {
    display: none;
  }
  
  .lyric-line {
    font-size: 15px;
    font-weight: 600;
    line-height: 1.8;
    color: var(--text-faint);
    padding: 2px 0;
    cursor: pointer;
    transition: all 0.3s ease;
    text-align: center;
  }
  
  .lyric-line:hover {
    color: var(--text-dim);
  }
  
  .lyric-line.active {
    color: var(--text);
    font-size: 18px;
    transform: scale(1.05);
  }
  
  .lyric-line.past {
    color: var(--text-faint);
    opacity: 0.5;
  }
  
  /* ===== 功能区 ===== */
  .features-section {
    flex: 1;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }
  
  /* 标签导航 */
  .nav-tabs {
    display: flex;
    padding: 12px 16px 0;
    gap: 6px;
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
  }
  
  .nav-tab {
    padding: 8px 16px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 20px;
    color: var(--text-dim);
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.2s;
  }
  
  .nav-tab:hover {
    background: var(--surface-hover);
    color: var(--text);
  }
  
  .nav-tab.active {
    background: var(--accent);
    border-color: var(--accent);
    color: #fff;
  }
  
  /* 内容区 */
  .tab-content {
    flex: 1;
    overflow: hidden;
  }
  
  .tab-pane {
    height: 100%;
    display: none;
    overflow-y: auto;
    scrollbar-width: thin;
    scrollbar-color: var(--border) transparent;
  }
  
  .tab-pane.active {
    display: block;
  }
  
  .tab-pane::-webkit-scrollbar {
    width: 6px;
  }
  
  .tab-pane::-webkit-scrollbar-track {
    background: transparent;
  }
  
  .tab-pane::-webkit-scrollbar-thumb {
    background: var(--border);
    border-radius: 3px;
  }
  
  /* 播放列表 */
  .playlist-pane {
    padding: 16px;
  }
  
  .playlist-title {
    font-size: 18px;
    font-weight: 700;
    margin-bottom: 12px;
  }
  
  .playlist-item {
    display: flex;
    align-items: center;
    padding: 10px 12px;
    border-radius: 8px;
    cursor: pointer;
    transition: background 0.2s;
    gap: 12px;
  }
  
  .playlist-item:hover {
    background: var(--surface-hover);
  }
  
  .playlist-item.active {
    background: var(--accent-soft);
  }
  
  .item-index {
    width: 24px;
    font-size: 13px;
    color: var(--text-dim);
    text-align: center;
  }
  
  .item-cover {
    width: 40px;
    height: 40px;
    border-radius: 6px;
    background: var(--surface);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 16px;
    flex-shrink: 0;
  }
  
  .item-info {
    flex: 1;
    min-width: 0;
  }
  
  .item-title {
    font-size: 14px;
    font-weight: 600;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  
  .playlist-item.active .item-title {
    color: var(--accent);
  }
  
  .item-artist {
    font-size: 12px;
    color: var(--text-dim);
  }
  
  .item-duration {
    font-size: 12px;
    color: var(--text-dim);
    flex-shrink: 0;
  }
  
  /* 搜索 */
  .search-pane {
    padding: 16px;
  }
  
  .search-box {
    display: flex;
    gap: 8px;
    margin-bottom: 16px;
  }
  
  .search-input {
    flex: 1;
    padding: 10px 16px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 20px;
    color: var(--text);
    font-size: 13px;
    transition: all 0.2s;
  }
  
  .search-input:focus {
    outline: none;
    border-color: var(--accent);
    box-shadow: 0 0 0 3px var(--accent-glow);
  }
  
  .search-input::placeholder {
    color: var(--text-dim);
  }
  
  .search-btn {
    padding: 10px 20px;
    background: var(--accent);
    border: none;
    border-radius: 20px;
    color: #fff;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    transition: background 0.2s;
  }
  
  .search-btn:hover {
    background: var(--accent-hover);
  }
  
  .search-hint {
    color: var(--text-dim);
    font-size: 13px;
    text-align: center;
    padding: 40px 0;
  }
  
  /* 场景 */
  .scene-pane {
    padding: 16px;
  }
  
  .scene-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 10px;
  }
  
  .scene-card {
    background: var(--card-bg);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 16px;
    text-align: center;
    cursor: pointer;
    transition: all 0.2s;
  }
  
  .scene-card:hover {
    background: var(--surface-hover);
    border-color: var(--accent);
    transform: translateY(-2px);
  }
  
  .scene-card.active {
    background: var(--accent-soft);
    border-color: var(--accent);
  }
  
  .scene-icon {
    font-size: 28px;
    margin-bottom: 8px;
  }
  
  .scene-name {
    font-size: 12px;
    font-weight: 600;
  }
  
  /* 编排 */
  .bus-pane {
    padding: 16px;
  }
  
  .bus-item {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 10px 12px;
    background: var(--surface);
    border-radius: 8px;
    margin-bottom: 6px;
    font-size: 13px;
  }
  
  .bus-type {
    padding: 3px 8px;
    background: var(--accent-soft);
    color: var(--accent);
    border-radius: 4px;
    font-size: 10px;
    font-weight: 700;
  }
  
  .bus-name {
    flex: 1;
  }
  
  .bus-duration {
    color: var(--text-dim);
    font-size: 11px;
  }
  
  /* ===== 底部控制条 ===== */
  .player-controls {
    height: 72px;
    background: var(--surface);
    border-top: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 0 24px;
    flex-shrink: 0;
  }
  
  .controls-inner {
    display: flex;
    align-items: center;
    gap: 20px;
    width: 100%;
    max-width: 500px;
  }
  
  .ctrl-btn {
    width: 36px;
    height: 36px;
    border-radius: 50%;
    background: none;
    border: none;
    color: var(--text-dim);
    font-size: 18px;
    cursor: pointer;
    transition: all 0.2s;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  
  .ctrl-btn:hover {
    color: var(--text);
  }
  
  .ctrl-btn.play {
    width: 44px;
    height: 44px;
    background: var(--accent);
    color: #fff;
    font-size: 20px;
  }
  
  .ctrl-btn.play:hover {
    background: var(--accent-hover);
    transform: scale(1.05);
  }
  
  .progress-section {
    flex: 1;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  
  .time {
    font-size: 11px;
    color: var(--text-dim);
    width: 36px;
    text-align: center;
  }
  
  .progress-track {
    flex: 1;
    height: 4px;
    background: var(--surface-active);
    border-radius: 2px;
    cursor: pointer;
    position: relative;
  }
  
  .progress-fill {
    height: 100%;
    background: var(--accent);
    border-radius: 2px;
    width: 35%;
    position: relative;
  }
  
  .progress-thumb {
    position: absolute;
    right: -6px;
    top: 50%;
    transform: translateY(-50%);
    width: 12px;
    height: 12px;
    background: var(--accent);
    border-radius: 50%;
    opacity: 0;
    transition: opacity 0.2s;
    box-shadow: 0 0 8px var(--accent-glow);
  }
  
  .progress-track:hover .progress-thumb {
    opacity: 1;
  }
  
  /* ===== 主题切换按钮 ===== */
  .theme-toggle {
    position: fixed;
    top: 20px;
    right: 20px;
    width: 48px;
    height: 48px;
    border-radius: 50%;
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--text);
    font-size: 20px;
    cursor: pointer;
    transition: all 0.2s;
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 100;
  }
  
  .theme-toggle:hover {
    background: var(--surface-hover);
    transform: scale(1.1);
  }
  
  /* ===== 响应式：宽屏左右布局 ===== */
  @media (min-width: 650px) {
    .player-wrapper {
      max-width: 900px;
      height: 600px;
    }
    
    .main-content {
      flex-direction: row;
    }
    
    .now-playing-section {
      width: 340px;
      display: flex;
      flex-direction: column;
      border-right: 1px solid var(--border);
      border-bottom: none;
    }
    
    .now-playing {
      flex-direction: column;
      align-items: center;
      text-align: center;
      flex: 1;
    }
    
    .cover-container {
      width: 180px;
      height: 180px;
      margin-bottom: 16px;
    }
    
    .track-info {
      align-items: center;
    }
    
    .track-actions {
      justify-content: center;
    }
    
    .lyrics-section {
      height: 150px;
    }
    
    .features-section {
      flex: 1;
    }
  }
  
  /* ===== 响应式：窄屏垂直布局 ===== */
  @media (max-width: 649px) {
    .player-wrapper {
      max-width: 400px;
    }
    
    .now-playing {
      flex-direction: row;
      align-items: center;
    }
    
    .cover-container {
      width: 100px;
      height: 100px;
    }
    
    .lyrics-section {
      height: 80px;
    }
  }
</style>
</head>

    </div>
  </div>
</div>

<script>
// 主题切换
let currentTheme = 'dark';
function toggleTheme() {
  currentTheme = currentTheme === 'dark' ? 'light' : 'dark';
  document.body.dataset.theme = currentTheme;
  document.querySelector('.theme-toggle').textContent = currentTheme === 'dark' ? '🌙' : '☀️';
}

// 标签切换
function switchTab(btn, tabId) {
  btn.parentElement.querySelectorAll('.nav-tab').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  document.querySelectorAll('.tab-pane').forEach(p => p.classList.remove('active'));
  document.getElementById(tabId).classList.add('active');
}

// 播放按钮
let isPlaying = true;
document.getElementById('playBtn').addEventListener('click', function() {
  isPlaying = !isPlaying;
  this.textContent = isPlaying ? '▶' : '⏸';
  document.getElementById('coverArt').classList.toggle('spinning', isPlaying);
});

// 歌词滚动
let lyricIndex = 3;
setInterval(() => {
  const lines = document.querySelectorAll('.lyric-line');
  lines.forEach(l => l.classList.remove('active', 'past'));
  lyricIndex = (lyricIndex + 1) % lines.length;
  lines.forEach((l, i) => {
    if (i < lyricIndex) l.classList.add('past');
    if (i === lyricIndex) l.classList.add('active');
  });
  const activeLine = document.querySelector('.lyric-line.active');
  if (activeLine) activeLine.scrollIntoView({ behavior: 'smooth', block: 'center' });
}, 3000);
</script>

</body>
</html>
